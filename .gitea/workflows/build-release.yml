name: Build and Release .pext

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install invoke pyyaml

      - name: Read version from extension.yaml
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $line = Select-String -Path "extension.yaml" -Pattern "^\s*Version\s*:" | Select-Object -First 1
          $version = ($line.Line -split ":", 2)[1].Trim()
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build (Release)
        run: invoke build

      - name: Download Playnite Toolbox
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path tmp | Out-Null
          Invoke-WebRequest -Uri "https://github.com/JosefNemec/Playnite/releases/download/10.9/Playnite109.zip" -OutFile "Playnite109.zip"
          Expand-Archive -Path "Playnite109.zip" -DestinationPath "tmp/playnite" -Force

      - name: Pack extension
        run: invoke pack --toolbox ./tmp/playnite/Toolbox.exe

      - name: Create Gitea Release and upload
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:TAG
          $baseUrl = "${{ github.server_url }}/api/v1"
          $repo = "${{ github.repository }}"
          $headers = @{ "Authorization" = "token ${{ github.token }}"; "Content-Type" = "application/json" }

          # Create release if not exists
          try {
            $rel = Invoke-RestMethod -Uri "$baseUrl/repos/$repo/releases/tags/$tag" -Headers $headers
            $releaseId = $rel.id
          } catch {
            $body = @{ tag_name = $tag; name = "LudusaviPlaynite $tag"; body = "Automated release"; draft = $false; prerelease = $false } | ConvertTo-Json
            $rel = Invoke-RestMethod -Uri "$baseUrl/repos/$repo/releases" -Method POST -Headers $headers -Body $body
            $releaseId = $rel.id
          }

          # Upload dist files
          $files = Get-ChildItem -Path "dist" -File | Where-Object { $_.Extension -in ".pext", ".zip" }
          foreach ($f in $files) {
            $assets = Invoke-RestMethod -Uri "$baseUrl/repos/$repo/releases/$releaseId/assets" -Headers @{ "Authorization" = "token ${{ github.token }}" }
            $existing = $assets | Where-Object { $_.name -eq $f.Name }
            if ($existing) {
              Invoke-RestMethod -Uri "$baseUrl/repos/$repo/releases/$releaseId/assets/$($existing.id)" -Method DELETE -Headers @{ "Authorization" = "token ${{ github.token }}" }
            }

            $uploadUrl = "$baseUrl/repos/$repo/releases/$releaseId/assets?name=$($f.Name)"
            $bytes = [System.IO.File]::ReadAllBytes($f.FullName)
            Invoke-RestMethod -Uri $uploadUrl -Method POST -Headers @{ "Authorization" = "token ${{ github.token }}" } -ContentType "application/octet-stream" -Body $bytes
            Write-Host "Uploaded $($f.Name)"
          }
